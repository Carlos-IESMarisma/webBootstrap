<div class="container mt-5">

  <h1>Contacto</h1>
  <p>Rellena el siguiente formulario para ponerte en contacto con nosotros.</p>

  <form class="mt-4">

    <div class="mb-3">
      <label class="form-label">Nombre</label>
      <input type="text" class="form-control" placeholder="Tu nombre">
    </div>

    <div class="mb-3">
      <label class="form-label">Correo electrónico</label>
      <input type="email" class="form-control" placeholder="ejemplo@email.com">
    </div>

    <div class="mb-3">
      <label class="form-label">Asunto</label>
      <input type="text" class="form-control" placeholder="Motivo del mensaje">
    </div>

    <div class="mb-3">
      <label class="form-label">Mensaje</label>
      <textarea class="form-control" rows="4" placeholder="Escribe tu mensaje..."></textarea>
    </div>

    <button type="submit" class="btn btn-primary">Enviar</button>

  </form>

</div>
